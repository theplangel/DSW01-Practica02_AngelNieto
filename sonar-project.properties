sonar.projectName=crud-empleados
sonar.host.url=https://sonarcloud.io

# Analyze backend Java sources only (frontend is not tracked in this repository)
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.test.inclusions=**/*Test.java,**/*IT.java,**/*IntegrationTest.java

# Java analysis needs compiled classes
sonar.java.binaries=target/classes

# Exclude generated/build assets
sonar.exclusions=**/target/**,**/*.min.js
