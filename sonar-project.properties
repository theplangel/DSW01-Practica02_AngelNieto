sonar.projectName=crud-empleados
sonar.host.url=https://sonarcloud.io

# Analyze backend and frontend sources
sonar.sources=src/main/java,frontend/src
sonar.tests=src/test/java,frontend/src
sonar.test.inclusions=**/*Test.java,**/*.spec.ts

# Java analysis needs compiled classes
sonar.java.binaries=target/classes

# Exclude generated/build assets
sonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/*.min.js
